<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Online Store</h1>
        <div id="cart">
            <span>Cart: <span id="cart-count">0</span> items</span>
        </div>
    </header>
    <main>
        <div class="product" data-name="Product 1" data-price="10.00">
            <!-- Placeholder for Product 1 Image -->
            <img src="https://via.placeholder.com/250" alt="Product 1" class="product-image">
            <h2>Product 1</h2>
            <p>Price: $10.00</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        <div class="product" data-name="Product 2" data-price="20.00">
            <!-- Placeholder for Product 2 Image -->
            <img src="https://via.placeholder.com/250" alt="Product 2" class="product-image">
            <h2>Product 2</h2>
            <p>Price: $20.00</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        <div class="product" data-name="Product 3" data-price="30.00">
            <!-- Placeholder for Product 3 Image -->
            <img src="https://via.placeholder.com/250" alt="Product 3" class="product-image">
            <h2>Product 3</h2>
            <p>Price: $30.00</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
    </main>
    <!-- Modal for Cart -->
    <div id="cart-modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Your Cart</h2>
            <!-- Cart Items will be populated here dynamically -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
