<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Online Store</h1>
        <div id="cart">
            <span>Cart: <span id="cart-count">0</span> items</span>
        </div>
    </header>
    <main>
        <div class="product" data-name="Product 1" data-price="10.00">
            <!-- Image for Product 1 -->
            <img src="https://golden-goods.com/wp-content/uploads/2022/12/638071123624300000-2.jpg" alt="Product 1" class="product-image">
            <h2>Product 1</h2>
            <p>Price: $10.00</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        <div class="product" data-name="Product 2" data-price="20.00">
            <!-- Image for Product 2 -->
            <img src="https://img.91app.com/webapi/imagesV3/Original/SalePage/6678640/0/639107285631370000?v=1" alt="Product 2" class="product-image">
            <h2>Product 2</h2>
            <p>Price: $20.00</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        <div class="product" data-name="Product 3" data-price="30.00">
            <!-- Image for Product 3 -->
            <img src="https://lcp-prod-obs.line-scdn.net/0hpIs3LhyVL2ZOSj-PHNdQMR8XIxd9OytuJzIyW2pLGh05exdVL2wzXxcDIw0TexNvDiQwXxtJCgkDcgNCGSwBZRwXDSAbegBZFWUISxdIGh0TJjhVc2o/f640w" alt="Product 3" class="product-image">
            <h2>Product 3</h2>
            <p>Price: $30.00</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
    </main>
    <!-- Modal for Cart -->
    <div id="cart-modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Your Cart</h2>
            <!-- Cart Items will be populated here dynamically -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
