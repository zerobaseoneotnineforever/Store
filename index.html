<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Real Simple Drink Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>A Real Simple Drink Store</h1>
        <div id="cart">
            <span>Cart: <span id="cart-count">0</span> items</span>
        </div>
    </header>

    <main id="product-grid">
        <div class="product" data-name="Orange Juice" data-price="60" data-img="https://golden-goods.com/wp-content/uploads/2022/12/638071123624300000-2.jpg">
            <img src="https://golden-goods.com/wp-content/uploads/2022/12/638071123624300000-2.jpg" alt="Orange Juice" class="product-image">
            <h2>Orange Juice</h2>
            <p>Price: NT$ 60</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        <div class="product" data-name="Grape Juice" data-price="60" data-img="https://img.91app.com/webapi/imagesV3/Original/SalePage/6678640/0/639107285631370000?v=1">
            <img src="https://img.91app.com/webapi/imagesV3/Original/SalePage/6678640/0/639107285631370000?v=1" alt="Grape Juice" class="product-image">
            <h2>Grape Juice</h2>
            <p>Price: NT$ 60</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        <div class="product" data-name="Coca-Cola" data-price="50" data-img="https://lcp-prod-obs.line-scdn.net/0hpIs3LhyVL2ZOSj-PHNdQMR8XIxd9OytuJzIyW2pLGh05exdVL2wzXxcDIw0TexNvDiQwXxtJCgkDcgNCGSwBZRwXDSAbegBZFWUISxdIGh0TJjhVc2o/f640w">
            <img src="https://lcp-prod-obs.line-scdn.net/0hpIs3LhyVL2ZOSj-PHNdQMR8XIxd9OytuJzIyW2pLGh05exdVL2wzXxcDIw0TexNvDiQwXxtJCgkDcgNCGSwBZRwXDSAbegBZFWUISxdIGh0TJjhVc2o/f640w" alt="Coca-Cola" class="product-image">
            <h2>Coca-Cola</h2>
            <p>Price: NT$ 50</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
    </main>

  <div id="cart-modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <div id="cart-total"></div>

        <div id="customer-info" style="margin-top: 20px; border-top: 1px solid #ddd; padding-top: 15px;">
            <input type="text" id="cust-name" placeholder="Your Name" required style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
            <input type="email" id="cust-email" placeholder="Your Email" required style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
            <p style="color: #d9534f; font-weight: bold; font-size: 0.9em; text-align: center;">⚠️ Please Pay With Cash.</p>
        </div>

        <button id="checkout-btn" style="width: 100%; margin-top: 10px; background: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold;">Submit Order</button>
        <button id="clear-cart-btn">Clear Cart</button>
    </div>
</div>

<form id="checkout-form" action="https://formsubmit.co/rafaeldistribution811@gmail.com" method="POST" style="display:none;">
    <input type="hidden" name="_subject" value="New Drink Order!">
    <input type="hidden" name="Customer_Name" id="form-name">
    <input type="hidden" name="Customer_Email" id="form-email">
    <input type="hidden" name="Order_Details" id="form-order-details">
    <input type="hidden" name="Total_Price" id="form-total-price">
    <input type="hidden" name="Payment_Method" value="Cash">
</form>

    <footer>
        <p>made by Rafa</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
